<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Google Mars</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
</head>

<body>
    <div id="cesiumContainer"></div>
    <div id="rp-title">GOOGLE MARS</div>

    <div id="searchOverlay"></div>
    <div id="searchWrap" class="rp-card">
        <div id="searchInputRow">
            <svg id="searchIcon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="8.5" cy="8.5" r="5.5" stroke="#5f6368" stroke-width="1.5" />
                <line x1="12.5" y1="12.5" x2="17" y2="17" stroke="#5f6368" stroke-width="1.5" stroke-linecap="round" />
            </svg>
            <input id="searchInput" type="text" placeholder="Search…" autocomplete="off" />
            <button id="searchClear" aria-label="Clear search">✕</button>
        </div>
        <div id="searchResults"></div>
        <div id="featurePanel">
            <img id="fpImage" alt="" />
            <div id="fpName"></div>
            <div class="fp-row"><span class="fp-label">Type</span><span id="fpType"></span></div>
            <div class="fp-row"><span class="fp-label">Diameter</span><span id="fpDiameter"></span></div>
            <div class="fp-row"><span class="fp-label">Origin</span><span id="fpOrigin"></span></div>
            <div id="fpDesc"></div>
        </div>
        <div id="roverPanel" style="display: none">
            <img id="rpImage" alt="" />
            <div id="rpRover"></div>
            <div class="fp-row"><span class="fp-label">Position</span><span id="rpSol"></span></div>
            <div class="fp-row">
                <a id="rpLink" href="" target="_blank" rel="noopener" class="rover-link">View photos →</a>
            </div>
            <div id="rpDesc"></div>
        </div>
        <div id="roverPhotoPanel" style="display: none">
            <img id="rphImage" alt="" />
            <div id="rphName"></div>
            <div class="fp-row"><span class="fp-label">Sol</span><span id="rphSol"></span></div>
            <div class="fp-row"><span class="fp-label">Camera</span><span id="rphCamera"></span></div>
            <div class="fp-row"><span class="fp-label">Latitude</span><span id="rphLat"></span></div>
            <div class="fp-row"><span class="fp-label">Longitude</span><span id="rphLon"></span></div>
            <div id="rphCaption"></div>
        </div>
        <div id="satellitePanel" style="display: none">
            <img id="spImage" alt="" />
            <div id="spName"></div>
            <div class="fp-row"><span class="fp-label">Altitude</span><span id="spAlt"></span></div>
            <div class="fp-row"><span class="fp-label">Period</span><span id="spPeriod"></span></div>
            <div id="spDesc"></div>
        </div>
    </div>

    <button id="layersBtn" class="rp-card" aria-label="Toggle layers panel">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L2 7l10 5 10-5-10-5z" stroke="#5f6368" stroke-width="1.5" stroke-linejoin="round" />
            <path d="M2 12l10 5 10-5" stroke="#5f6368" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
            <path d="M2 17l10 5 10-5" stroke="#5f6368" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
    </button>

    <div id="layersPanel" class="rp-card">
        <div id="layersPanelHeader">
            <span class="layers-section-title" style="flex:1">Map Type</span>
            <button id="layersPanelClose" aria-label="Close">✕</button>
        </div>
        <div class="layer-btn-grid">
            <button class="layer-btn" id="layerBtnTerraformed">
                <img src="" alt="Terraformed" />
                <span>Terraformed</span>
            </button>
            <button class="layer-btn" id="layerBtnReal">
                <img src="" alt="Current View" />
                <span>Current View</span>
            </button>
        </div>
        <div class="layers-divider"></div>
        <div class="layers-section-title">Map Details</div>
        <div class="layer-btn-grid layer-btn-grid--3col">
            <button class="layer-btn" id="layerBtnExag">
                <img src="" alt="Exaggerated" />
                <span>Exaggerated</span>
            </button>
            <button class="layer-btn" id="layerBtnContours">
                <img src="" alt="Contours" />
                <span>Contours</span>
            </button>
            <button class="layer-btn" id="layerBtnGraticule">
                <img src="" alt="Lat/Long" />
                <span>Lat/Long</span>
            </button>
            <button class="layer-btn" id="layerBtnLabels">
                <img src="" alt="Labels" />
                <span>Labels</span>
            </button>
            <button class="layer-btn" id="layerBtnRovers">
                <img src="" alt="Rovers" />
                <span>Rovers</span>
            </button>
            <button class="layer-btn" id="layerBtnSatellites">
                <img src="" alt="Satellites" />
                <span>Satellites</span>
            </button>
        </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>

</html>
