<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Google Mars</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: 'Google Sans', Roboto, system-ui, sans-serif;
            background: #000 url('/images/starfield.jpg') center/cover no-repeat fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px;
        }
        .title {
            flex: 0 0 12.5%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.18em;
            color: #ffffff;
            text-shadow: 0 1px 4px rgba(0,0,0,0.6);
        }
        .qr-wrap {
            flex: 0 0 75%;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        .home {
            flex: 0 0 12.5%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .home a {
            color: #8ab4f8;
            font-size: 16px;
            text-decoration: none;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }
        .home a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="title">GOOGLE MARS</div>
    <div class="qr-wrap"><canvas id="qr"></canvas></div>
    <div class="home"><a id="home-link" href="/">googlemars.com</a></div>
    <script type="module" src="/src/qr.ts"></script>
</body>

</html>
